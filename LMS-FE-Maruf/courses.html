<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - LMS Solution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-2xl);
            flex-wrap: wrap;
            gap: var(--space-md);
        }

        .courses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: var(--space-xl);
        }

        .course-card {
            background: white;
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .course-card:hover {
            box-shadow: var(--shadow-xl);
            border-color: var(--primary-200);
        }

        .course-card.expanded {
            grid-column: 1 / -1;
            border-color: var(--primary-400);
        }

        .course-thumbnail {
            width: 100%;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 4rem;
            position: relative;
        }

        .course-category {
            position: absolute;
            top: var(--space-md);
            right: var(--space-md);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 600;
        }

        .course-content {
            padding: var(--space-xl);
        }

        .course-title {
            font-size: var(--text-xl);
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: var(--space-sm);
        }

        .course-description {
            color: var(--gray-600);
            font-size: var(--text-sm);
            margin-bottom: var(--space-lg);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .course-meta {
            display: flex;
            gap: var(--space-lg);
            margin-bottom: var(--space-lg);
        }

        .course-meta-item {
            display: flex;
            align-items: center;
            gap: var(--space-xs);
            font-size: var(--text-sm);
            color: var(--gray-500);
        }

        .course-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .course-modules-count {
            font-size: var(--text-sm);
            color: var(--primary-600);
            font-weight: 600;
        }

        .btn-enroll {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: var(--radius-lg);
            font-weight: 600;
            font-size: var(--text-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .btn-enroll:hover {
            box-shadow: var(--shadow-lg), var(--shadow-glow);
            transform: translateY(-2px);
        }
        .btn-enrolled {
            background: var(--success);
            cursor: default;
        }
        .btn-enrolled:hover {
            box-shadow: none;
            transform: none;
        }



        /* Exam Section */
        .exam-section {
            background: var(--gray-50);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            margin-bottom: var(--space-lg);
            border: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--space-md);
        }
        .exam-section.locked {
            opacity: 0.5;
        }
        .exam-info {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }
        .exam-icon {
            font-size: 2rem;
        }
        .exam-title {
            font-weight: 700;
            font-size: var(--text-base);
            margin-bottom: 2px;
        }
        .exam-meta {
            font-size: var(--text-xs);
            color: var(--gray-500);
        }
        .exam-score {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }
        .score-badge {
            background: var(--primary-50);
            color: var(--primary-700);
            font-weight: 700;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: var(--text-sm);
        }
        .score-badge.passed {
            background: var(--success-light);
            color: #065f46;
        }
        .score-badge.failed {
            background: var(--error-light);
            color: #991b1b;
        }

        /* Module List */
        .module-list {
            margin-top: var(--space-lg);
        }
        .module-list-header {
            font-size: var(--text-lg);
            font-weight: 700;
            margin-bottom: var(--space-md);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }
        .module-item {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-md) var(--space-lg);
            border-radius: var(--radius-lg);
            background: white;
            border: 1px solid var(--gray-200);
            margin-bottom: var(--space-sm);
            transition: all var(--transition-fast);
        }
        .module-item:hover:not(.locked) {
            border-color: var(--primary-300);
            box-shadow: var(--shadow-sm);
        }
        .module-item.locked {
            opacity: 0.5;
            background: var(--gray-50);
        }
        .module-item.completed {
            border-color: var(--success);
            background: linear-gradient(to right, #f0fdf4, white);
        }
        .module-item.active-module {
            border-color: var(--primary-500);
            background: var(--primary-50);
        }
        .module-num {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            background: var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: var(--text-sm);
            flex-shrink: 0;
        }
        .module-item.completed .module-num {
            background: var(--success);
            color: white;
        }
        .module-item.active-module .module-num {
            background: var(--gradient-primary);
            color: white;
        }
        .module-item.locked .module-num {
            background: var(--gray-300);
            color: var(--gray-500);
        }
        .module-item-info {
            flex: 1;
            min-width: 0;
        }
        .module-item-title {
            font-weight: 600;
            font-size: var(--text-sm);
            margin-bottom: 2px;
        }
        .module-item-meta {
            font-size: var(--text-xs);
            color: var(--gray-500);
        }
        .module-item-status {
            flex-shrink: 0;
        }

        @media (max-width: 640px) {
            .exam-section {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
        <a href="landing.html" class="navbar-brand">
            📚 LMS Solution
        </a>
        <div class="navbar-actions">
            <div id="roleSwitcher"></div>
            <div class="navbar-user" onclick="toggleUserDropdown(event)">
                <div class="user-avatar" id="userAvatar">U</div>
                <div class="user-info">
                    <div class="user-name" id="userName">User</div>
                    <div class="user-role" id="userRole">Beneficiary</div>
                </div>
                <div class="user-dropdown">
                    <a href="profile.html" class="dropdown-item">👤 My Profile</a>
                    <a href="change-password.html" class="dropdown-item">🔒 Change Password</a>
                </div>
            </div>
            <button class="btn btn-sm btn-nav" onclick="logout()">🚪 Logout</button>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header" style="display:flex;align-items:center;justify-content:space-between;">
            <a href="landing.html" class="sidebar-logo" style="text-decoration:none;">📚 LMS</a>
            <button class="sidebar-collapse-btn" onclick="toggleSidebar()" title="Collapse sidebar">«</button>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
        <div class="sidebar-footer">
            <button class="btn btn-danger btn-full" onclick="logout()">🚪 <span class="sidebar-btn-text">Logout</span></button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <div>
                    <h1>📚 Courses</h1>
                    <p class="text-muted">Browse and enroll in learning courses</p>
                </div>
            </div>

            <!-- Courses Grid -->
            <div class="courses-grid" id="coursesGrid">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>
    </main>



    <script src="app.js"></script>
    <script>
        const gradients = [
            'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
            'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)',
            'linear-gradient(135deg, #ee0979 0%, #ff6a00 100%)',
            'linear-gradient(135deg, #56ab2f 0%, #a8e063 100%)',
            'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
            'linear-gradient(135deg, #fa709a 0%, #fee140 100%)'
        ];
        const icons = ['📚', '📱', '🏪', '🌾', '💡', '📝'];

        // Hide add button for beneficiaries
        const role = getUserRole();
        if (role === 'beneficiary') {
            const addBtn = document.getElementById('addCourseBtn');
            if (addBtn) addBtn.style.display = 'none';
        }

        let expandedCourseId = null;

        function renderCourses() {
            const grid = document.getElementById('coursesGrid');
            const courses = demoData.courses;

            grid.innerHTML = courses.map((course, idx) => {
                let bgStyle = `background: ${gradients[idx % gradients.length]}`;
                let iconHtml = icons[idx % icons.length];
                
                if (course.id === 1) {
                    bgStyle = `background: url('course_card_financial.png') center/cover no-repeat;`;
                    iconHtml = ''; // Hide emoji if we have a real background image
                }
                if (course.id === 2) {
                    bgStyle = `background: url('course_card_investment.png') center/cover no-repeat;`;
                    iconHtml = '';
                }

                const moduleCount = course.modules ? course.modules.length : 0;
                const enrolled = isEnrolled(course.id);
                return `
                <div class="course-card" id="course-${course.id}">
                    <div style="cursor:pointer" onclick="handleCourseClick(${course.id})">
                        <div class="course-thumbnail" style="${bgStyle}">
                            ${iconHtml}
                            <span class="course-category">${course.category || 'General'}</span>
                        </div>
                        <div class="course-content">
                            <div class="course-title">${course.title}</div>
                            <div class="course-description">${course.description}</div>
                            <div class="course-meta">
                                <div class="course-meta-item">⏱️ ${course.duration}</div>
                                <div class="course-meta-item">📖 ${moduleCount} Modules</div>
                            </div>
                            <div class="course-footer">
                                <span class="course-modules-count">${enrolled ? '✅ Enrolled' : 'Click to enroll'}</span>
                                <button class="btn-enroll ${enrolled ? 'btn-enrolled' : ''}"
                                    onclick="event.stopPropagation(); handleEnroll(${course.id})">
                                    ${enrolled ? '✅ Enrolled' : '📝 Enroll'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            }).join('');
        }

        function handleEnroll(courseId) {
            if (isEnrolled(courseId)) return;
            enrollInCourse(courseId);
            expandedCourseId = courseId;
            renderCourses();
        }

        function handleCourseClick(courseId) {
            if (isEnrolled(courseId)) {
                window.location.href = `course_details.html?courseId=${courseId}`;
            } else {
                handleEnroll(courseId);
                // Optionally auto-redirect after enrollment:
                // window.location.href = `course_details.html?courseId=${courseId}`;
            }
        }



        function viewCourse(id) {
            window.location.href = `contents.html?courseId=${id}`;
        }

        function handleAddCourse(event) {
            event.preventDefault();
            const title = document.getElementById('courseTitle').value;
            const description = document.getElementById('courseDescription').value;
            const category = document.getElementById('courseCategory').value;
            const duration = document.getElementById('courseDuration').value;
            const moduleCount = parseInt(document.getElementById('moduleCount').value) || 1;

            const newModules = [];
            for (let i = 1; i <= moduleCount; i++) {
                newModules.push({
                    id: i,
                    title: `Module ${i}`,
                    description: '',
                    duration: '30 min',
                    videoUrl: '',
                    type: 'Video Lesson'
                });
            }

            addItem('courses', {
                title, description, category, duration,
                thumbnail: '',
                preExamId: null, postExamId: null,
                preExamMandatory: false, postExamMandatory: false,
                modules: newModules
            });

            closeModal('addCourseModal');
            document.getElementById('addCourseForm').reset();
            renderCourses();
            alert('✅ Course created successfully!');
        }

        // Initialize
        renderCourses();
    </script>
</body>

</html>
