<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Results - LMS Solution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: var(--gray-50);
        }

        .results-hero {
            background: linear-gradient(135deg, var(--primary-600) 0%, var(--primary-800) 100%);
            color: white;
            padding: var(--space-xl) var(--space-lg);
            text-align: center;
        }

        .results-hero h1 {
            color: white;
            margin-bottom: var(--space-md);
            font-size: var(--text-2xl);
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            border: 4px solid rgba(255, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: var(--space-md) auto;
        }

        .score-value {
            font-size: 2.2rem;
            font-weight: 700;
        }

        .score-label {
            font-size: var(--text-xs);
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-detail {
            font-size: var(--text-md);
            opacity: 0.9;
        }

        .score-pass {
            display: inline-block;
            background: rgba(16, 185, 129, 0.3);
            border: 1px solid rgba(16, 185, 129, 0.5);
            padding: 4px 16px;
            border-radius: var(--radius-full);
            margin-top: var(--space-sm);
            font-weight: 600;
            font-size: var(--text-sm);
        }

        .score-fail {
            display: inline-block;
            background: rgba(239, 68, 68, 0.3);
            border: 1px solid rgba(239, 68, 68, 0.5);
            padding: 4px 16px;
            border-radius: var(--radius-full);
            margin-top: var(--space-sm);
            font-weight: 600;
            font-size: var(--text-sm);
        }

        .results-container {
            max-width: 900px;
            margin: 0 auto;
            padding: var(--space-xl) var(--space-lg);
        }

        .attempts-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: var(--space-xl);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--space-xl);
            display: none;
        }

        .attempts-list {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-sm);
            margin-top: var(--space-md);
        }

        .attempt-btn {
            background: var(--gray-100);
            border: 1px solid var(--gray-300);
            padding: 8px 16px;
            border-radius: var(--radius-full);
            font-size: var(--text-sm);
            cursor: pointer;
            transition: all 0.2s;
            color: var(--gray-700);
        }

        .attempt-btn:hover {
            background: var(--gray-200);
        }

        .attempt-btn.active {
            background: var(--primary-600);
            color: white;
            border-color: var(--primary-700);
            font-weight: 600;
        }

        /* Progress Comparison */
        .comparison-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: var(--space-xl);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--space-xl);
            border: 2px solid var(--primary-100);
        }

        .comparison-card h3 {
            margin-bottom: var(--space-xl);
            text-align: center;
        }

        .comparison-bars {
            display: flex;
            gap: var(--space-2xl);
            justify-content: center;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-bottom: var(--space-xl);
        }

        .comparison-bar {
            text-align: center;
            min-width: 120px;
        }

        .bar-visual {
            width: 80px;
            margin: 0 auto var(--space-md);
            background: var(--gray-100);
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: relative;
            min-height: 200px;
            display: flex;
            align-items: flex-end;
        }

        .bar-fill {
            width: 100%;
            border-radius: var(--radius-lg);
            transition: height 1s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: var(--space-sm);
            font-weight: 700;
            color: white;
            font-size: var(--text-lg);
        }

        .bar-fill.pre {
            background: linear-gradient(to top, #fbbf24, #f59e0b);
        }

        .bar-fill.post {
            background: linear-gradient(to top, #34d399, #10b981);
        }

        .bar-label {
            font-weight: 600;
            color: var(--gray-700);
            font-size: var(--text-sm);
        }

        .improvement-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-sm);
            background: var(--success-light);
            color: #065f46;
            padding: 8px 20px;
            border-radius: var(--radius-full);
            font-weight: 700;
            font-size: var(--text-lg);
        }

        .improvement-badge.negative {
            background: var(--error-light);
            color: #991b1b;
        }

        /* Answer Review */
        .review-section {
            background: white;
            border-radius: var(--radius-xl);
            padding: var(--space-xl);
            box-shadow: var(--shadow-md);
            margin-bottom: var(--space-xl);
        }

        .review-section h3 {
            margin-bottom: var(--space-xl);
        }

        .review-item {
            padding: var(--space-lg);
            border: 1px solid var(--gray-200);
            border-radius: var(--radius-lg);
            margin-bottom: var(--space-md);
        }

        .review-item.correct {
            border-left: 4px solid var(--success);
            background: #f0fdf4;
        }

        .review-item.incorrect {
            border-left: 4px solid var(--error);
            background: #fef2f2;
        }

        .review-q-text {
            font-weight: 600;
            margin-bottom: var(--space-md);
        }

        .review-option {
            padding: 6px 12px;
            border-radius: var(--radius-md);
            margin-bottom: 4px;
            font-size: var(--text-sm);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .review-option.user-answer {
            background: var(--error-light);
            color: #991b1b;
        }

        .review-option.correct-answer {
            background: var(--success-light);
            color: #065f46;
        }

        .review-option.both {
            background: var(--success-light);
            color: #065f46;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: var(--space-md);
            flex-wrap: wrap;
        }

        @media (max-width: 640px) {
            .comparison-bars {
                flex-direction: column;
                align-items: center;
            }

            .bar-visual {
                min-height: 150px;
            }

            .score-circle {
                width: 100px;
                height: 100px;
            }

            .score-value {
                font-size: 1.8rem;
            }
        }

        /* Page scrollability fix */
        html, body {
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Responsive attempt history table */
        .attempt-table-scroll {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            width: 100%;
        }
        .attempt-table-scroll table {
            min-width: 480px;
            width: 100%;
        }
    </style>
</head>

<body>
    <!-- Results Hero -->
    <div class="results-hero" id="resultsHero">
        <h1 id="examTitle">Exam Results</h1>
        <div class="score-circle">
            <span class="score-value" id="scorePercent">0%</span>
            <span class="score-label">Score</span>
        </div>
        <div class="score-detail" id="scoreDetail">0 out of 0 correct</div>
        <div id="passStatus"></div>
    </div>

    <div class="results-container">
        <!-- Attempts History -->
        <div class="attempts-card" id="attemptsCard">
            <h3>🔄 Exam Attempt History</h3>
            <p style="font-size: var(--text-sm); color: var(--gray-600);">You have taken this exam multiple times.</p>
            <div class="attempts-list" id="attemptsList"></div>
        </div>
        <!-- Pre-Post Comparison (only for post-exam) -->
        <div class="comparison-card" id="comparisonCard" style="display: none;">
            <h3>📊 Your Learning Progress</h3>
            <div class="comparison-bars">
                <div class="comparison-bar">
                    <div class="bar-visual">
                        <div class="bar-fill pre" id="preBar" style="height: 0%;"></div>
                    </div>
                    <div class="bar-label">Pre-Exam</div>
                    <div style="font-size: var(--text-xs); color: var(--gray-500);" id="preBarLabel">0%</div>
                </div>
                <div class="comparison-bar">
                    <div class="bar-visual">
                        <div class="bar-fill post" id="postBar" style="height: 0%;"></div>
                    </div>
                    <div class="bar-label">Post-Exam</div>
                    <div style="font-size: var(--text-xs); color: var(--gray-500);" id="postBarLabel">0%</div>
                </div>
            </div>
            <div style="text-align: center;">
                <div class="improvement-badge" id="improvementBadge">↑ +0% Improvement</div>
            </div>
        </div>

        <!-- Answer Review Removed -->

        <!-- Actions -->
        <div class="action-buttons" id="actionButtons">
            <a href="#" id="backToCourse" class="btn btn-secondary btn-lg">⬅️ Back to Course</a>
            <!-- Retake Button will dynamically be inserted here -->
            <a href="certificate.html" id="certBtn" class="btn btn-primary btn-lg" style="display: none;">🎓 View
                Certificate</a>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const filterExamId = urlParams.get('examId');
        const courseId     = urlParams.get('courseId');

        // Find exam config for pass mark
        const examConfig = filterExamId ? demoData.exams.find(e => String(e.id) === String(filterExamId)) : null;
        const passMark = examConfig ? (examConfig.passMark || 60) : 60;
        const examName = examConfig ? examConfig.name : 'Exam';

        // Update heading
        if (examConfig) {
            document.getElementById('examTitle').textContent = examName;
        }

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem('examHistory') || '[]');

            // Filter by examId if provided
            if (filterExamId) {
                history = history.filter(h => String(h.examId) === String(filterExamId));
            }
            // Filter by courseId if provided (and no exam filter)
            if (courseId && !filterExamId) {
                history = history.filter(h => h.courseId === courseId);
            }

            // Back link
            if (courseId) {
                document.getElementById('backToCourse').href = `course_details.html?courseId=${courseId}`;
            } else {
                document.getElementById('backToCourse').href = `courses.html`;
            }

            if (history.length === 0) {
                document.getElementById('resultsHero').innerHTML = `
                    <h1 style="color:white;">${examName}</h1>
                    <p style="color:rgba(255,255,255,0.8);">No attempts recorded yet.</p>`;
                document.getElementById('attemptsCard').style.display = 'none';
                return;
            }

            // Most recent attempt
            const latest = history[history.length - 1];
            const passed = latest.percentage >= passMark;

            document.getElementById('examTitle').textContent = latest.title || examName;
            document.getElementById('scorePercent').textContent = latest.percentage + '%';
            document.getElementById('scoreDetail').textContent = `${latest.score} / ${latest.maxScore} correct`;
            document.getElementById('passStatus').innerHTML = passed
                ? `<span class="score-pass">✅ Passed (≥${passMark}%)</span>`
                : `<span class="score-fail">❌ Not Passed (need ${passMark}%)</span>`;

            document.getElementById('attemptsCard').style.display = 'block';

            // Full history table
            const tableHtml = `
                <h4 style="margin-bottom:var(--space-md);">📋 All ${history.length} Attempt${history.length !== 1 ? 's' : ''}</h4>
                <div class="attempt-table-scroll">
                <table style="width:100%;border-collapse:collapse;min-width:480px;">
                    <thead>
                        <tr style="background:var(--gray-100);">
                            <th style="padding:12px;border-bottom:2px solid var(--gray-200);text-align:left;">#</th>
                            <th style="padding:12px;border-bottom:2px solid var(--gray-200);text-align:left;">Date & Time</th>
                            <th style="padding:12px;border-bottom:2px solid var(--gray-200);text-align:left;">Exam</th>
                            <th style="padding:12px;border-bottom:2px solid var(--gray-200);text-align:left;">Type</th>
                            <th style="padding:12px;border-bottom:2px solid var(--gray-200);text-align:left;">Score</th>
                            <th style="padding:12px;border-bottom:2px solid var(--gray-200);text-align:left;">Result</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${history.slice().reverse().map((h, i) => {
                            const attemptPassed = h.percentage >= (h.passMark || passMark);
                            const rowBg = attemptPassed ? '#f0fdf4' : '#fff5f5';
                            return `<tr style="background:${rowBg};border-bottom:1px solid var(--gray-200);">
                                <td style="padding:12px;">${history.length - i}</td>
                                <td style="padding:12px;">${new Date(h.date).toLocaleString('en-BD')}</td>
                                <td style="padding:12px;font-weight:600;">${h.title || '—'}</td>
                                <td style="padding:12px;"><span class="badge ${h.type === 'pre' ? 'badge-primary' : 'badge-success'}">${(h.type || 'exam').toUpperCase()}</span></td>
                                <td style="padding:12px;font-weight:700;font-size:1.1rem;">${h.percentage}%<br><span style="font-size:var(--text-xs);font-weight:normal;color:var(--gray-500);">${h.score}/${h.maxScore}</span></td>
                                <td style="padding:12px;">${attemptPassed ? '<span style="color:#16a34a;font-weight:700;">✅ Pass</span>' : '<span style="color:#dc2626;font-weight:700;">❌ Fail</span>'}</td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table>
                </div>`;
            document.getElementById('attemptsList').innerHTML = tableHtml;

            // Retake button
            const existing = document.querySelector('.retake-btn');
            if (!existing) {
                const retakeBtn = document.createElement('a');
                retakeBtn.href = `exam.html?id=${latest.examId}&courseId=${latest.courseId}&type=${latest.type}`;
                retakeBtn.className = 'btn btn-primary btn-lg retake-btn';
                retakeBtn.innerHTML = '🔄 Retake Exam';
                document.getElementById('actionButtons').insertBefore(retakeBtn, document.getElementById('certBtn'));
            }

            // Pre vs Post comparison
            if (latest.type === 'post' && courseId) {
                const allHistory = JSON.parse(localStorage.getItem('examHistory') || '[]');
                const preExams = allHistory.filter(h => h.courseId === courseId && h.type === 'pre');
                if (preExams.length > 0) {
                    const pre = preExams[preExams.length - 1];
                    const diff = latest.percentage - pre.percentage;
                    document.getElementById('comparisonCard').style.display = 'block';
                    document.getElementById('preBar').style.height = pre.percentage + '%';
                    document.getElementById('preBar').textContent = pre.percentage + '%';
                    document.getElementById('preBarLabel').textContent = pre.percentage + '%';
                    document.getElementById('postBar').style.height = latest.percentage + '%';
                    document.getElementById('postBar').textContent = latest.percentage + '%';
                    document.getElementById('postBarLabel').textContent = latest.percentage + '%';
                    const badge = document.getElementById('improvementBadge');
                    if (diff > 0) { badge.textContent = `↑ +${diff}% Improvement`; badge.classList.remove('negative'); }
                    else { badge.textContent = `↓ ${Math.abs(diff)}% Change`; badge.classList.add('negative'); }
                }
            }

            // Certificate button
            if (courseId && latest.type === 'post' && passed) {
                const certBtn = document.getElementById('certBtn');
                certBtn.href = `certificate.html?courseId=${courseId}`;
                certBtn.style.display = 'inline-flex';
            }
        }

        renderHistory();
    </script>
</body>
</htm
